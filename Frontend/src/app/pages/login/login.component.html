<section class="auth-page">
  <div class="auth-panel">
    <p class="auth-kicker">Welcome back</p>
    <h1>Login</h1>
    <p class="auth-copy">Sign in with your username or email to access the dashboard.</p>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label for="usernameOrEmail">
        Username or email
        <input
          id="usernameOrEmail"
          type="text"
          formControlName="usernameOrEmail"
          autocomplete="username"
          placeholder="mario.rossi or user@example.com"
          [class.is-invalid]="fieldInvalid('usernameOrEmail')"
        >
      </label>

      @if (fieldInvalid('usernameOrEmail')) {
        <p class="field-message">Enter a valid username or email.</p>
      }

      <label for="password">
        Password
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="Your password"
          [class.is-invalid]="fieldInvalid('password')"
        >
      </label>

      @if (fieldInvalid('password')) {
        <p class="field-message">Password must be at least 8 characters.</p>
      }

      @if (error()) {
        <p class="form-message form-message-error">{{ error() }}</p>
      }

      <button class="primary-button" type="submit" [disabled]="loading()">
        {{ loading() ? 'Signing in...' : 'Login' }}
      </button>
    </form>

    <p class="auth-switch">
      Need an account?
      <a routerLink="/register">Register</a>
    </p>
  </div>
</section>
