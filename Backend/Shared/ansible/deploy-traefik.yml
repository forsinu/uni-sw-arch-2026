---
- name: Deploy Traefik API Gateway in Docker Swarm
  hosts: swarmManagers[0]
  become: true
  vars_files:
    - "{{ playbook_dir }}/groupVars/all.yml"

  tasks:
    - name: Create Traefik stack directory
      ansible.builtin.file:
        path: "{{ traefikStackPath | dirname }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Ensure shared encrypted Traefik network exists
      community.docker.docker_network:
        name: "{{ traefikNetwork }}"
        driver: overlay
        scope: swarm
        attachable: true
        driver_options:
          encrypted: "true"
        state: present

    - name: Render Traefik stack file
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/traefik-stack.yml.j2"
        dest: "{{ traefikStackPath }}"
        owner: root
        group: root
        mode: "0644"

    - name: Deploy Traefik stack
      ansible.builtin.command: >
        docker stack deploy
        -c {{ traefikStackPath }}
        {{ traefikStackName }}
      register: traefikDeploy
      changed_when: >
        'Creating service' in traefikDeploy.stdout or
        'Updating service' in traefikDeploy.stdout or
        'Creating network' in traefikDeploy.stdout