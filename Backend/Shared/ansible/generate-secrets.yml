---
- name: Generate runtime secrets for Swarm services
  hosts: swarmManagers[0]
  become: true
  vars_files:
    - "{{ playbook_dir }}/groupVars/all.yml"
    - "{{ playbook_dir }}/groupVars/vault.yml"

  tasks:
    - name: Ensure OpenSSL is installed
      ansible.builtin.package:
        name: openssl
        state: present

    - name: Create secrets directory
      ansible.builtin.file:
        path: "{{ secretsRoot }}"
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Check if JWT private key already exists
      ansible.builtin.stat:
        path: "{{ jwtPrivateKeyPath }}"
      register: jwtPrivateKeyStat

    - name: Generate JWT private key
      ansible.builtin.command: >
        openssl genrsa
        -out {{ jwtPrivateKeyPath }}
        {{ jwtKeySize }}
      when: not jwtPrivateKeyStat.stat.exists
      no_log: true

    - name: Set private key permissions
      ansible.builtin.file:
        path: "{{ jwtPrivateKeyPath }}"
        owner: root
        group: root
        mode: "0600"

    - name: Check if JWT public key already exists
      ansible.builtin.stat:
        path: "{{ jwtPublicKeyPath }}"
      register: jwtPublicKeyStat

    - name: Generate JWT public key from private key
      ansible.builtin.command: >
        openssl rsa
        -in {{ jwtPrivateKeyPath }}
        -pubout
        -out {{ jwtPublicKeyPath }}
      when: not jwtPublicKeyStat.stat.exists
      no_log: true

    - name: Set public key permissions
      ansible.builtin.file:
        path: "{{ jwtPublicKeyPath }}"
        owner: root
        group: root
        mode: "0644"

    - name: Write auth DB password to protected file
      ansible.builtin.copy:
        content: "{{ vaultAuthDbPassword }}"
        dest: "{{ authDbPasswordSecretPath }}"
        owner: root
        group: root
        mode: "0600"
      no_log: true

    - name: Write RabbitMQ user to protected file
      ansible.builtin.copy:
        content: "{{ vaultRabbitmqUser }}"
        dest: "{{ rabbitmqUserSecretPath }}"
        owner: root
        group: root
        mode: "0600"
      no_log: true

    - name: Write RabbitMQ password to protected file
      ansible.builtin.copy:
        content: "{{ vaultRabbitmqPassword }}"
        dest: "{{ rabbitmqPasswordSecretPath }}"
        owner: root
        group: root
        mode: "0600"
      no_log: true

    - name: List existing Docker secrets
      ansible.builtin.command: docker secret ls --format '{{ "{{" }}.Name{{ "}}" }}'
      register: existingDockerSecrets
      changed_when: false

    - name: Create JWT private key Docker secret
      ansible.builtin.command: docker secret create {{ jwtPrivateKeySecretName }} {{ jwtPrivateKeyPath }}
      when: jwtPrivateKeySecretName not in existingDockerSecrets.stdout_lines
      no_log: true

    - name: Create JWT public key Docker secret
      ansible.builtin.command: docker secret create {{ jwtPublicKeySecretName }} {{ jwtPublicKeyPath }}
      when: jwtPublicKeySecretName not in existingDockerSecrets.stdout_lines
      no_log: true

    - name: Create auth DB password Docker secret
      ansible.builtin.command: docker secret create {{ authDbPasswordSecretName }} {{ authDbPasswordSecretPath }}
      when: authDbPasswordSecretName not in existingDockerSecrets.stdout_lines
      no_log: true

    - name: Create RabbitMQ user Docker secret
      ansible.builtin.command: docker secret create {{ rabbitmqUserSecretName }} {{ rabbitmqUserSecretPath }}
      when: rabbitmqUserSecretName not in existingDockerSecrets.stdout_lines
      no_log: true

    - name: Create RabbitMQ password Docker secret
      ansible.builtin.command: docker secret create {{ rabbitmqPasswordSecretName }} {{ rabbitmqPasswordSecretPath }}
      when: rabbitmqPasswordSecretName not in existingDockerSecrets.stdout_lines
      no_log: true