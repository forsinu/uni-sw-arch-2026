services:
  auth-db:
    image: postgres:15-alpine

    environment:
      POSTGRES_USER: ${DB_AUTH_USER}
      POSTGRES_PASSWORD: ${DB_AUTH_PASSWD}
      POSTGRES_DB: ${DB_AUTH_NAME}

    volumes:
      - auth-db-data:/var/lib/postgresql/data/

    networks:
      - auth-net

    restart: unless-stopped

  auth-service:
    build:
      context: ${AUTH_SERVICE_DIR}
      dockerfile: Dockerfile

    env_file:
      - ./Services/AuthService/.env

    environment:
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_NAME: ${DB_AUTH_NAME}
      DB_USER: ${DB_AUTH_USER}
      DB_PASSWD: ${DB_AUTH_PASSWD}

      JWT_ALGORITHM: ${JWT_ALGORITHM}
      PRIVATE_KEY_PATH: ${JWT_PRIVATE_KEY_CONTAINER_PATH}
      PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_CONTAINER_PATH}

      API_PREFIX: ${AUTH_API_PREFIX}

    volumes:
      - ${JWT_PRIVATE_KEY_HOST_PATH}:${JWT_PRIVATE_KEY_CONTAINER_PATH}:ro
      - ${JWT_PUBLIC_KEY_HOST_PATH}:${JWT_PUBLIC_KEY_CONTAINER_PATH}:ro

    depends_on:
      - auth-db

    networks:
      - auth-net
      - service-mesh-net

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=service-mesh-net"

      - "traefik.http.routers.auth.rule=Host(`app.docker.localhost`) && PathPrefix(`/auth`)"
      - "traefik.http.routers.auth.entrypoints=websecure"
      - "traefik.http.routers.auth.tls=true"

      - "traefik.http.services.auth.loadbalancer.server.port=8000"

      - "traefik.http.middlewares.auth-strip.stripprefix.prefixes=/auth"
      - "traefik.http.routers.auth.middlewares=auth-strip"

    restart: unless-stopped

  federation-db:
    image: postgres:15-alpine

    environment:
      POSTGRES_USER: ${DB_FEDERATION_USER}
      POSTGRES_PASSWORD: ${DB_FEDERATION_PASSWD}
      POSTGRES_DB: ${DB_FEDERATION_NAME}

    volumes:
      - federation-db-data:/var/lib/postgresql/data/

    networks:
      - federation-net

    restart: unless-stopped

  federation-service:
    build:
      context: ${FEDERATION_SERVICE_DIR}
      dockerfile: Dockerfile

    env_file:
      - ./Services/FedService/.env

    environment:
      DB_HOST: federation-db
      DB_PORT: 5432
      DB_NAME: ${DB_FEDERATION_NAME}
      DB_USER: ${DB_FEDERATION_USER}
      DB_PASSWD: ${DB_FEDERATION_PASSWD}

      AUTH_HOST: auth-service
      AUTH_PORT: 8000

      JWT_ALGORITHM: ${JWT_ALGORITHM}
      API_PREFIX: ${FEDERATION_API_PREFIX}

    depends_on:
      - federation-db
      - auth-service

    networks:
      - federation-net
      - service-mesh-net

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=service-mesh-net"

      - "traefik.http.routers.federation.rule=Host(`app.docker.localhost`) && PathPrefix(`/federation`)"
      - "traefik.http.routers.federation.entrypoints=websecure"
      - "traefik.http.routers.federation.tls=true"

      - "traefik.http.services.federation.loadbalancer.server.port=8000"

      - "traefik.http.middlewares.federation-strip.stripprefix.prefixes=/federation"
      - "traefik.http.routers.federation.middlewares=federation-strip"

    restart: unless-stopped

  competition-db:
    image: postgres:15-alpine

    environment:
      POSTGRES_USER: ${DB_COMPETITION_USER}
      POSTGRES_PASSWORD: ${DB_COMPETITION_PASSWD}
      POSTGRES_DB: ${DB_COMPETITION_NAME}

    volumes:
      - competition-db-data:/var/lib/postgresql/data/

    networks:
      - competition-net

    restart: unless-stopped

  competition-service:
    build:
      context: ${COMPETITION_SERVICE_DIR}
      dockerfile: Dockerfile

    env_file:
      - ./Services/CompetitionService/.env

    environment:
      DB_HOST: competition-db
      DB_PORT: 5432
      DB_NAME: ${DB_COMPETITION_NAME}
      DB_USER: ${DB_COMPETITION_USER}
      DB_PASSWD: ${DB_COMPETITION_PASSWD}

      AUTH_HOST: auth-service
      AUTH_PORT: 8000

      JWT_ALGORITHM: ${JWT_ALGORITHM}
      API_PREFIX: ${COMPETITION_API_PREFIX}

    depends_on:
      - competition-db
      - auth-service

    networks:
      - competition-net
      - service-mesh-net

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=service-mesh-net"

      - "traefik.http.routers.competition.rule=Host(`app.docker.localhost`) && PathPrefix(`/competition`)"
      - "traefik.http.routers.competition.entrypoints=websecure"
      - "traefik.http.routers.competition.tls=true"

      - "traefik.http.services.competition.loadbalancer.server.port=8000"

      - "traefik.http.middlewares.competition-strip.stripprefix.prefixes=/competition"
      - "traefik.http.routers.competition.middlewares=competition-strip"

    restart: unless-stopped

volumes:
  auth-db-data:
  federation-db-data:
  competition-db-data:

networks:
  auth-net:
    driver: bridge

  federation-net:
    driver: bridge

  competition-net:
    driver: bridge

  service-mesh-net:
    external: true
    name: service-mesh-net
