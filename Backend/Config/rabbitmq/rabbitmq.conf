# =========================
# Listeners
# =========================

listeners.tcp.default = 5672
management.tcp.port = 15672

# =========================
# Default vhost/user
# Created only when the RabbitMQ database is initialized from scratch.
# If the Docker volume already exists, changing these values will not recreate users.
# =========================

default_vhost = /
default_user = service
default_pass = service

default_user_tags.administrator = true

default_permissions.configure = .*
default_permissions.read = .*
default_permissions.write = .*

# =========================
# Guest user restriction
# Keep guest local-only. Use admin from Docker services.
# =========================

loopback_users.guest = true

# =========================
# Resource limits
# Tune these later for production.
# =========================

disk_free_limit.absolute = 1GB
vm_memory_high_watermark.relative = 0.6

# =========================
# Heartbeats
# =========================

heartbeat = 60

# =========================
# Management statistics
# =========================

collect_statistics = coarse
collect_statistics_interval = 5000